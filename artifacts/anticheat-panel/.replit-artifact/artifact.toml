kind = "web"
previewPath = "/"
title = "Anti-Cheat Management Panel"
version = "1.0.0"
id = "artifacts/anticheat-panel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18630

[services.development]
run = "pnpm --filter @workspace/anticheat-panel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/anticheat-panel", "run", "build" ]
publicDir = "artifacts/anticheat-panel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18630"
BASE_PATH = "/"
